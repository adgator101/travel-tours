<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Travel</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/style.css"/>
</head>
<body>

  <div class="card">

    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <img src="assets/logo.png" alt="Travel Logo" class="logo-img"/>
    </div>

    <h1>Welcome Back</h1>
    <p class="subtitle">Login to continue your travel journey</p>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email" autocomplete="email"/>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
    </div>

    <div class="forgot-row">
      <a href="#" class="forgot-link">Forgot password?</a>
    </div>

    <button class="btn-signup" id="loginBtn">Login</button>

    <p class="footer-links">
      Don't have an account? <a href="signup.html">Sign Up</a>
    </p>
    <a class="return-home" href="#">← Return to Home</a>

  </div>

  <script src="services/config.js"></script>
  <script src="services/login.js"></script>
</body>
</html>
